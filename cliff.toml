# git-cliff configuration
# Reference: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

body = """

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | split(pat="-->") | last | trim | upper_first }}

    {% for commit in commits -%}
        - {% if commit.scope %}_({{ commit.scope }})_ {% endif -%}
          {{ commit.message | upper_first | trim }}
    {% endfor %}
{%- endfor -%}
"""

footer = """

{% for release in releases -%}
    {%- if release.version -%}
        {%- if release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/hakula139/oxide-code/compare/{{ release.previous.version }}..{{ release.version }}
        {%- else -%}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/hakula139/oxide-code/releases/tag/{{ release.version }}
        {%- endif -%}
    {%- else -%}
[unreleased]: https://github.com/hakula139/oxide-code/compare/{{ release.previous.version }}...HEAD
    {%- endif %}
{%- if not loop.last %}
{% endif -%}
{% endfor -%}
"""

# `trim = true` strips per-line whitespace from each TEMPLATE line before Tera
# compiles it, allowing the indentation above to remain readable without
# leaking into the rendered output.
trim = true

# Postprocessors run on each rendered template (header / body / footer)
# separately, so anchor-based stripping of trailing newlines isn't useful
# (it would eat the body's separator newline before the footer).
postprocessors = [
  { pattern = '\n{3,}', replace = "\n\n" },
  # Trim Dependabot / Renovate verbose phrasing for `chore(deps)` commits.
  { pattern = ' in the [a-z]+ group(?: across \d+ director(?:y|ies))?', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = true
filter_commits = true
sort_commits = "oldest"

commit_preprocessors = [
  # Backtick inline HTML in commit subjects so markdown renders them as code,
  # not invisible elements. The `(^|[^`])` capture stands in for a negative
  # lookbehind (unsupported in Rust regex) to skip already-fenced spans.
  { pattern = '(^|[^`])(<\/?[a-zA-Z][^>]*>)', replace = '$1`$2`' },
]

# Group names carry a `<!-- N -->` sort prefix (stripped in the body template)
# so sections render in priority order, not alphabetically. Order matters:
# most specific first — `!`-marked commits must hit "Breaking changes" before
# falling through to the generic type rules.
commit_parsers = [
  { message = '^[a-z]+(\([^)]+\))?!:', group = "<!-- 0 -->Breaking changes" },
  { message = "^feat", group = "<!-- 1 -->Added" },
  { message = "^fix", group = "<!-- 2 -->Fixed" },
  { message = "^perf", group = "<!-- 3 -->Changed" },
  { message = "^revert", group = "<!-- 4 -->Removed" },
  # Dependency bumps (Dependabot, Renovate, manual) get their own section
  # rather than getting lost in the broader `chore` skip below.
  { message = '^chore\(deps\)', group = "<!-- 5 -->Dependencies" },
  { message = "^refactor", skip = true },
  { message = "^docs", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
]

[remote.github]
owner = "hakula139"
repo = "oxide-code"
