# Catppuccin Latte — light variant.
# https://github.com/catppuccin/catppuccin

# Text hierarchy
text = "#4c4f69"
muted = "#9ca0b0"
dim = "#acb0be"

# Surfaces
# Latte ships an opaque base bg (Catppuccin Latte `base`) so dark text
# is readable on terminals whose own bg is dark. Override to "reset"
# on transparent / light terminals to let the terminal bg show through.
surface = { bg = "#eff1f5" }

# Semantic accents
accent = { fg = "#1e66f5", bold = true }
user = "#fe640b"
queued = "#8839ef"
assistant = "#7287fd"

# Status indicators
info = "#04a5e5"
success = "#40a02b"
warning = "#df8e1d"
error = "#d20f39"

# Code
code = "#179299"
inline_code = "#fe640b"

# Diff backgrounds (light pastels for the light variant)
diff_add = { bg = "#c8e4ce" }
diff_del = { bg = "#f0c8d0" }

# Markdown headings
heading_h1 = { fg = "#4c4f69", bold = true, underlined = true }
heading_h2 = { fg = "#4c4f69", bold = true }
heading_h3 = { fg = "#4c4f69", bold = true, italic = true }
heading_minor = { fg = "#4c4f69", italic = true }

# Markdown body
thinking = { fg = "#acb0be", italic = true }
link = { fg = "#1e66f5", underlined = true }
blockquote = "#40a02b"
list_marker = "#1e66f5"

# Markdown chrome
horizontal_rule = "#acb0be"
table_header = { fg = "#4c4f69", bold = true }
table_border = "#acb0be"

# UI chrome
tool_border = "#9ca0b0"
tool_icon = "#1e66f5"
border_focused = "#1e66f5"
border_unfocused = "#acb0be"
separator = "#acb0be"
