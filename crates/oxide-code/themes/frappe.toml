# Catppuccin Frappe — medium variant (less dark than Mocha).
# Palette: https://github.com/catppuccin/catppuccin

text = "#c6d0f5"  # Text
muted = "#737994" # Overlay0
dim = "#626880"   # Surface2

surface = "#414559" # Surface0

accent = { fg = "#8caaee", bold = true } # Blue (bold)
user = "#ef9f76"                         # Peach
secondary = "#babbf1"                    # Lavender

code = "#81c8be"                # Teal
code_bg = { bg = "#303446" }    # Base
inline_code = "#ef9f76"         # Peach
code_block_fallback = "#81c8be" # Teal

diff_add_bg = { bg = "#344037" }
diff_del_bg = { bg = "#41323d" }

info = "#99d1db"    # Sky
success = "#a6d189" # Green
warning = "#e5c890" # Yellow
error = "#e78284"   # Red

heading_h1 = { fg = "#c6d0f5", bold = true, underlined = true }
