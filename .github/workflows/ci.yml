name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHIX_NAME: hakula
  CARGO_TERM_COLOR: always

jobs:
  flake-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: ${{ env.CACHIX_NAME }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix_skip_push: ${{ !(github.ref == 'refs/heads/main' || github.actor == 'hakula139') }}

      - name: Run flake check
        run: nix flake check

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: ${{ env.CACHIX_NAME }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix_skip_push: ${{ !(github.ref == 'refs/heads/main' || github.actor == 'hakula139') }}

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: nix develop -c cargo fmt --all --check

      - name: Clippy
        run: nix develop -c cargo clippy --all-targets -- -D warnings

      - name: Test
        run: nix develop -c cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: ${{ env.CACHIX_NAME }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix_skip_push: ${{ !(github.ref == 'refs/heads/main' || github.actor == 'hakula139') }}

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2

      - name: Generate coverage
        run: nix develop -c cargo llvm-cov --ignore-filename-regex 'main\.rs' --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  node-check:
    name: Node Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: ${{ env.CACHIX_NAME }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix_skip_push: ${{ !(github.ref == 'refs/heads/main' || github.actor == 'hakula139') }}

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Lint Markdown
        run: nix develop -c pnpm lint

      - name: Spell check
        run: nix develop -c pnpm spellcheck

  nix-build:
    name: Nix Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: ${{ env.CACHIX_NAME }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix_skip_push: ${{ !(github.ref == 'refs/heads/main' || github.actor == 'hakula139') }}

      - name: Build oxide-code
        run: nix build .#oxide-code --print-build-logs
